apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: cvsm
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None   # headless, pakai DNS langsung
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: cvsm
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - { name: POSTGRES_DB, value: cvsm }
            - { name: POSTGRES_USER, value: cvsm }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: cvsm-env, key: DATABASE_URL } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
            - { name: migrations, mountPath: /docker-entrypoint-initdb.d }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 1000m, memory: 1Gi }
      volumes:
        - name: migrations
          configMap: { name: cvsm-migrations }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 10Gi } }
